    ChargeCreate:
      type: object
      required:
        - email
        - amount
      properties:
        email:
          description: Customer's email address
          type: string
        amount:
          description: >
            Amount should be in the subunit of the supported currency (e.g. kobo
            for NGN, pesewas for GHS, cents for ZAR/USD/KES). For XOF, the
            amount is the same as the base units (not multiplied by 100).
          type: integer
        authorization_code:
          description: An authorization code to charge.
          type: string
        pin:
          description: 4-digit PIN (send with a non-reusable authorization code)
          type: string
        reference:
          description: Unique transaction reference. Only -, .`, = and alphanumeric
            characters allowed.
          type: string
        birthday:
          description: The customer's birthday in the format YYYY-MM-DD e.g 2017-05-16
          type: string
          format: date
        device_id:
          description: >-
            This is the unique identifier of the device a user uses in making
            payment. 

            Only -, .`, = and alphanumeric characters are allowed.
          type: string
        metadata:
          description: JSON object or stringified JSON of custom data
          anyOf:
            - type: string
            - type: object
            - type: integer
            - type: integer
      example:
        email: customer@email.com
        amount: 350000
        authorization_code: AUTH_df1l5ehnym
    Bank:
      type: object
