  /___internal___:
    get:
      summary: Internal path for schema generation
      description: This path is internal and used to ensure that schemas like
        WebhookEvent are considered 'used' for SDK generation and linting.
      operationId: misc_generateWebhookEventTypes
      tags:
        - Internal
      x-internal: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEvent"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Secret key in the format sk_domain_xxxxxx
  schemas:
    WebhookEvent:
      type: object
      properties:
        event:
          type: string
          description: The type of event that occurred.
        data:
          type: object
          description: The payload of the event.
      oneOf:
        - type: object
          properties:
            event:
              type: string
              enum:
                - charge.success
            data:
              $ref: "#/components/schemas/data"
          required:
            - event
            - data
        - type: object
          properties:
            event:
              type: string
              enum:
                - transfer.success
            data:
              $ref: "#/components/schemas/data-2"
          required:
            - event
            - data
        - type: object
          properties:
            event:
              type: string
              enum:
                - transfer.failed
            data:
              $ref: "#/components/schemas/data-2"
          required:
            - event
            - data
        - type: object
          properties:
            event:
              type: string
              enum:
                - transfer.reversed
            data:
              $ref: "#/components/schemas/data-2"
          required:
            - event
            - data
        - type: object
          properties:
            event:
              type: string
              enum:
                - subscription.create
            data:
              $ref: "#/components/schemas/data-3"
          required:
            - event
            - data
        - type: object
          properties:
            event:
              type: string
              enum:
                - subscription.disable
            data:
              $ref: "#/components/schemas/data-3"
          required:
            - event
            - data
        - type: object
          properties:
            event:
              type: string
              enum:
                - subscription.not_renew
            data:
              $ref: "#/components/schemas/data-3"
          required:
            - event
            - data
        - type: object
          properties:
            event:
              type: string
              enum:
                - invoice.create
            data:
              $ref: "#/components/schemas/data-4"
          required:
            - event
            - data
        - type: object
          properties:
            event:
              type: string
              enum:
                - invoice.update
            data:
              $ref: "#/components/schemas/data-4"
          required:
            - event
            - data
        - type: object
          properties:
            event:
              type: string
              enum:
                - invoice.failed
            data:
              $ref: "#/components/schemas/data-4"
          required:
            - event
            - data
        - type: object
          properties:
            event:
              type: string
              enum:
                - dedicatedaccount.assign.success
            data:
              $ref: "#/components/schemas/data-5"
          required:
            - event
            - data
        - type: object
          properties:
            event:
              type: string
              enum:
                - dedicatedaccount.assign.failed
            data:
              $ref: "#/components/schemas/data-5"
          required:
            - event
            - data
        - type: object
          properties:
            event:
              type: string
              enum:
                - refund.processed
            data:
              $ref: "#/components/schemas/data-6"
          required:
            - event
            - data
        - type: object
          properties:
            event:
              type: string
              enum:
                - refund.failed
            data:
              $ref: "#/components/schemas/data-6"
          required:
            - event
            - data
        - type: object
          properties:
            event:
              type: string
              enum:
                - charge.dispute.create
            data:
              $ref: "#/components/schemas/data-7"
          required:
            - event
            - data
        - type: object
          properties:
            event:
              type: string
              enum:
                - charge.dispute.resolve
            data:
              $ref: "#/components/schemas/data-7"
          required:
            - event
            - data
    Currency:
      description: List of all support currencies
      type: string
      enum:
        - GHS
        - KES
        - NGN
        - ZAR
        - USD
        - XOF
      example: GHS
    SplitSubaccounts:
      type: object
      properties:
        subaccount:
          description: Subaccount code of the customer or partner
          type: string
        share:
          description: The percentage or flat quota of the customer or partner
          type: integer
      example:
        subaccount: ACCT_6uujpqtzmnufzkw
        share: 50
    SplitCreate:
      type: object
      description: |
        Split configuration for transactions
      required:
        - name
        - type
        - subaccounts
        - currency
      properties:
        name:
          description: Name of the transaction split
          type: string
        type:
          description: The type of transaction split you want to create.
          type: string
          enum:
            - percentage
            - flat
        subaccounts:
          description: A list of object containing subaccount code and number of shares
          type: array
          items:
            $ref: "#/components/schemas/SplitSubaccounts"
        currency:
          description: The transaction currency
          type: string
          enum:
            - NGN
            - GHS
            - ZAR
            - USD
            - XOF
        bearer_type:
          description: This allows you specify how the transaction charge should be
            processed
          type: string
          enum:
            - subaccount
            - account
            - all-proportional
            - all
        bearer_subaccount:
          description: This is the subaccount code of the customer or partner that would
            bear the transaction charge if you specified subaccount as the
            bearer type
          type: string
      example:
        name: Halfsies
        type: percentage
        currency: NGN
        subaccounts:
          - subaccount: ACCT_6uujpqtzmnufzkw
            share: 50
    TransactionInitialize:
      description: Initialize a transaction
      type: object
      required:
        - email
        - amount
      properties:
        email:
          description: Customer's email address
          type: string
        amount:
          description: >
            Amount should be in the subunit of the supported currency (e.g. kobo
            for NGN, pesewas for GHS, cents for ZAR/USD/KES). For XOF, the
            amount is the same as the base units (not multiplied by 100).


            Minimum amounts:
             - NGN: ₦50.00 (5000 kobo)
             - GHS: ₵0.10 (10 pesewas)
             - ZAR: R1.00 (100 cents)
             - KES: Ksh 3.00 (300 cents)
             - USD: $2.00 (200 cents)
             - XOF: 1.00 (1 XOF)
          oneOf:
            - type: integer
            - type: string
        currency:
          $ref: "#/components/schemas/Currency"
        reference:
          description: Unique transaction reference. Only -, ., = and alphanumeric
            characters allowed.
          type: string
        channels:
          description: >
            An array of payment channels to control what channels you want to
            make available to the user to make a payment with
          type: array
          items:
            type: string
            enum:
              - card
              - bank
              - ussd
              - qr
              - eft
              - mobile_money
              - bank_transfer
              - apple_pay
              - capitec_pay
              - payattitude
        callback_url:
          description: >
            Fully qualified url, e.g. https://example.com/ to redirect your
            customers to after a successful payment. Use this to override the
            callback url provided on the dashboard for this transaction
          type: string
        plan:
          description: >
            If transaction is to create a subscription to a predefined plan,
            provide plan code here. 

            This would invalidate the value provided in amount
          type: string
        invoice_limit:
          description: Number of times to charge customer during subscription to plan
          type: integer
        split_code:
          description: The split code of the transaction split
          type: string
        split:
          $ref: "#/components/schemas/SplitCreate"
        subaccount:
          description: The code for the subaccount that owns the payment
          type: string
        transaction_charge:
          description: >
            A flat fee to charge the subaccount for a transaction. 

            This overrides the split percentage set when the subaccount was
            created
          type: integer
        bearer:
          description: The bearer of the transaction charge
          type: string
          enum:
            - account
            - subaccount
        label:
          description: Used to replace the email address shown on the Checkout
          type: string
        metadata:
          description: JSON object or stringified JSON of custom data
          anyOf:
            - type: string
            - type: object
            - type: integer
      example:
        email: test@demo.com
        amount: 10000
    TransactionInitializeResponse:
      type: object
      properties:
        status:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            authorization_url:
              type: string
            access_code:
              type: string
            reference:
              type: string
          required:
            - authorization_url
            - access_code
            - reference
      required:
        - status
        - message
        - data
    ErrorMeta:
      type: object
      description: Extra diagnostic information to help resolve an error
