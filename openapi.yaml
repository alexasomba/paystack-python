    TransferBase:
      type: object
      required:
        - amount
        - recipient
        - reference
      properties:
        amount:
          description: >
            Amount should be in the subunit of the supported currency (e.g. kobo
            for NGN, pesewas for GHS, cents for ZAR/USD/KES). For XOF, the
            amount is the same as the base units (not multiplied by 100).
          type: integer
        recipient:
          description: The transfer recipient's code
          type: string
        reference:
          description: >
            To ensure idempotency, you need to provide e a unique identifier for
            the request.  The identifier should be a lowercase alphanumeric
            string with only -,_  symbols allowed.
          type: string
          minLength: 16
        reason:
          description: The reason or narration for the transfer.
          type: string
        metadata:
          description: JSON object or stringified JSON of custom data
          anyOf:
            - type: string
            - type: object
            - type: integer
      example:
        amount: 120000
        recipient: RCP_gd9vgag7n5lr5ix
        reference: acv_9ee55786-2323-4760-98e2-6380c9cb3f68
